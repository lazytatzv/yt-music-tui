name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release

      - name: Archive Binary
        run: |
          mkdir -p dist
          cp target/release/yt-tui dist/
          cd dist
          tar -czf yt-tui-linux-x86_64.tar.gz yt-tui

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/yt-tui-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
